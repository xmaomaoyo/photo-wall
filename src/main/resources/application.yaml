spring:
  application:
    name: photo-wall
  profiles:
    active: @spring.profiles.active@  # Maven构建时替换

# Knife4j 配置
knife4j:
  enable: true           # 启用 Knife4j 增强模式
  setting:
    language: zh_cn       # 界面语言设置为中文

# SpringDoc 配置
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  # 扫描controller包
  packages-to-scan: com.mimi.photowall.controller

# 验证码配置
verification:
  code:
    length: 6  # 验证码长度
    expire: 300  # 验证码有效期（秒）
    max-attempts: 5  # 最大验证次数
    send-interval: 60  # 发送间隔（秒）

# 密码配置
password:
  random:
    length: 12  # 随机密码长度
    include-uppercase: true  # 包含大写字母
    include-lowercase: true  # 包含小写字母
    include-digits: true  # 包含数字
    include-symbols: true  # 包含特殊符号